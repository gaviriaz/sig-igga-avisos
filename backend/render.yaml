services:
  - type: web
    name: sig-igga-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.3
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://sig-igga.pages.dev,http://localhost:5173"
